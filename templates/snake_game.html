<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Snake Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* The wrapper ensures the game stays square while filling the width */
        .game-wrapper {
            width: 100%;
            position: relative;
            aspect-ratio: 1 / 1;
            background-color: #000;
        }

        .trinket-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Laptop Games</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Home</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="game-wrapper">
        <iframe class="trinket-iframe" src="https://trinket.io/embed/python/cb578223a426?outputOnly=true&runOption=run" allowfullscreen></iframe>
    </div>

</body>
</html>
